# Orbi — Build & Release
# Simplificado do original OpenCode. Sem Docker, AUR, Homebrew, GitHub App, runners pagos.
# Secrets opcionais: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_API_KEY_PATH,
#   APPLE_API_ISSUER, APPLE_API_KEY, TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
# Sem nenhum secret, funciona — só não assina os binários (usuário vê aviso no OS).

name: publish
run-name: "release v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.0.2)"
        required: true
        type: string

concurrency:
  group: publish-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  # ─── 1. Create draft release ───────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        id: release
        run: |
          gh release create "v${{ inputs.version }}" \
            --draft \
            --title "v${{ inputs.version }}" \
            --notes "Orbi v${{ inputs.version }}" \
            --repo "${{ github.repository }}"
          RELEASE_ID=$(gh release view "v${{ inputs.version }}" --json databaseId -q .databaseId --repo "${{ github.repository }}")
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "release=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "repo=${{ github.repository }}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}
    outputs:
      version: ${{ steps.release.outputs.version }}
      release: ${{ steps.release.outputs.release }}
      tag: ${{ steps.release.outputs.tag }}
      repo: ${{ steps.release.outputs.repo }}

  # ─── 2. Build CLI (cross-compiles all platforms on ubuntu) ─────────
  build-cli:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Build
        run: ./packages/orbi/script/build.ts
        env:
          ORBI_VERSION: ${{ needs.version.outputs.version }}
          ORBI_RELEASE: ${{ needs.version.outputs.release }}
          GH_REPO: ${{ needs.version.outputs.repo }}
          GH_TOKEN: ${{ github.token }}

      - uses: actions/upload-artifact@v4
        with:
          name: orbi-cli
          path: packages/orbi/dist

  # ─── 3. Build Desktop (Tauri) ─────────────────────────────────────
  build-tauri:
    needs: [build-cli, version]
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      # Apple code signing (optional — skips if secrets not configured)
      - name: Check Apple certificate
        if: runner.os == 'macOS'
        id: apple-cert
        run: |
          if [ -n "$CERT" ]; then echo "available=true" >> $GITHUB_OUTPUT; fi
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}

      - uses: apple-actions/import-codesign-certs@v2
        if: steps.apple-cert.outputs.available == 'true'
        with:
          keychain: build
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify Certificate
        if: steps.apple-cert.outputs.available == 'true'
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV

      - name: Setup Apple API Key
        if: steps.apple-cert.outputs.available == 'true'
        run: echo "${{ secrets.APPLE_API_KEY_PATH }}" > $RUNNER_TEMP/apple-api-key.p8

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Linux dependencies
      - name: Install dependencies (ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Rust
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.settings.target }}

      # Prepare sidecar (download CLI binary from build-cli job)
      - name: Prepare
        run: |
          cd packages/desktop
          bun ./scripts/prepare.ts
        env:
          ORBI_VERSION: ${{ needs.version.outputs.version }}
          RUST_TARGET: ${{ matrix.settings.target }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      # AppImage portable workaround (Linux only)
      - name: Resolve tauri portable SHA
        if: runner.os == 'Linux'
        run: echo "TAURI_PORTABLE_SHA=$(git ls-remote https://github.com/tauri-apps/tauri.git refs/heads/feat/truly-portable-appimage | cut -f1)" >> "$GITHUB_ENV"

      - name: Install tauri-cli (portable appimage branch)
        if: runner.os == 'Linux'
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: tauri-cli
          git: https://github.com/tauri-apps/tauri
          rev: ${{ env.TAURI_PORTABLE_SHA }}

      # Build and upload
      - name: Build and upload artifacts
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 60
        with:
          projectPath: packages/desktop
          tauriScript: ${{ (runner.os == 'Linux' && 'cargo tauri') || '' }}
          args: --target ${{ matrix.settings.target }} --config ./src-tauri/tauri.prod.conf.json --verbose
          updaterJsonPreferNsis: true
          releaseId: ${{ needs.version.outputs.release }}
          tagName: ${{ needs.version.outputs.tag }}
          releaseDraft: true
          assetNamePattern: orbi-desktop-[platform]-[arch][ext]
          releaseCommitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: true
          # Signing env vars omitted — add when certificates are configured:
          # TAURI_SIGNING_PRIVATE_KEY, APPLE_CERTIFICATE, APPLE_SIGNING_IDENTITY, etc.

  # ─── 4. Build Desktop (Electron) ──────────────────────────────────
  build-electron:
    needs: [build-cli, version]
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            platform_flag: --mac --arm64
          - host: macos-latest
            target: x86_64-apple-darwin
            platform_flag: --mac --x64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            platform_flag: --win
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform_flag: --linux
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      # Apple code signing (optional)
      - name: Check Apple certificate
        if: runner.os == 'macOS'
        id: apple-cert
        run: |
          if [ -n "$CERT" ]; then echo "available=true" >> $GITHUB_OUTPUT; fi
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}

      - uses: apple-actions/import-codesign-certs@v2
        if: steps.apple-cert.outputs.available == 'true'
        with:
          keychain: build
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Setup Apple API Key
        if: steps.apple-cert.outputs.available == 'true'
        run: echo "${{ secrets.APPLE_API_KEY_PATH }}" > $RUNNER_TEMP/apple-api-key.p8

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Linux dependencies
      - name: Install dependencies (ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm

      # Prepare sidecar
      - name: Prepare
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop-electron
        env:
          ORBI_VERSION: ${{ needs.version.outputs.version }}
          ORBI_CHANNEL: prod
          RUST_TARGET: ${{ matrix.settings.target }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      # Build
      - name: Build
        run: bun run build
        working-directory: packages/desktop-electron
        env:
          ORBI_CHANNEL: prod

      # Package and upload to release
      - name: Package and publish
        if: needs.version.outputs.release
        run: npx electron-builder ${{ matrix.settings.platform_flag }} --publish always --config electron-builder.config.ts
        working-directory: packages/desktop-electron
        timeout-minutes: 60
        env:
          ORBI_CHANNEL: prod
          GH_TOKEN: ${{ github.token }}
          # Disable code signing (no certificate configured yet)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # Add these back when Apple certificate is configured:
          # CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          # CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_API_KEY: ${{ runner.temp }}/apple-api-key.p8
          # APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY }}
          # APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - uses: actions/upload-artifact@v4
        with:
          name: orbi-electron-${{ matrix.settings.target }}
          path: packages/desktop-electron/dist/*

  # ─── 5. Finalize — undraft the release ─────────────────────────────
  finalize:
    needs: [version, build-cli, build-tauri, build-electron]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        run: |
          gh release edit "${{ needs.version.outputs.tag }}" \
            --draft=false \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}
